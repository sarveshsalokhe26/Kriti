name: kriti_app
description: Kriti E-Commerce Flutter App
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP & API
  http: ^1.1.0
  dio: ^5.3.0
  
  # State Management
  provider: ^6.0.0
  
  # Local Storage
  shared_preferences: ^2.2.0
  flutter_secure_storage: ^9.0.0
  
  # Form Validation
  form_validator: ^2.0.0
  
  # UI/UX
  google_fonts: ^5.0.0
  flutter_svg: ^2.0.0
  intl: ^0.18.0
  
  # Utilities
  uuid: ^4.0.0
  connectivity_plus: ^5.0.0
  
  # Firebase (optional for notifications)
  firebase_core: ^2.14.0
  firebase_messaging: ^14.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  
flutter:
  uses-material-design: true
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
